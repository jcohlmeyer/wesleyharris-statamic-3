<div
    class="
        flex flex-col md:flex-row
    "
>
    <div
        class="
            md:pr-3
            flex-grow md:flex-shrink
            md:flex-basis-1/4
            md:relative
        "
    >
        <div class="md:sticky top-4 z-40">
            {{ jewellery_categories }}
                <h1
                    class="
                        text-white uppercase font-bold
                        bg-gray
                        mb-4 p-2
                    "
                >
                    <a href="{{ url }}" class="text-white">{{ title }}</a>
                </h1>
            {{ /jewellery_categories }}
            <nav>
                <ul>
                    {{ current_id = id }}
                    {{ collection:hollowware :taxonomy:jewellery_categories="category" }}
                        <li class="mb-4">
                            <a
                                href="{{ url }}"
                                class="
                                    text-white uppercase leading-snug
                                    block
                                    p-2
                                    {{ if id == current_id }}bg-black{{ else }}bg-gray{{ /if }}
                                "
                            >
                                {{ title }}
                            </a>
                        </li>
                    {{ /collection:hollowware }}
                </ul>
            </nav>
        </div>
    </div>
    <main
        class="
            flex-grow md:flex-shrink
            md:flex-basis-3/4
            md:pl-3
            relative
            pt-6 md:pt-0
        "
    >
        <h2
            class="
                text-white uppercase font-bold
                bg-gray
                mb-4 p-2
                sticky top-4 z-40
            "
        >
            {{ title }}
        </h2>
        <figure
            class="
                flex flex-col
                {{ if text_position == 'right' }}lg:flex-row{{ /if }}
                mb-4
            "
        >
            {{ main_photo }}
                <div
                    class="
                        flex-grow flex-shrink lg:flex-basis-1/2 xl:flex-basis-2/3
                        mb-4
                        {{ if text_position == 'right' }}
                            lg:mb-0
                            lg:mr-4
                        {{ /if }}
                    "
                >
                    <img
                        src="{{ url }}"
                        alt="{{ alt | smartypants | entities }}"
                        loading="lazy"
                        decoding="async"
                    />
                </div>
            {{ /main_photo }}
            <div
                class="
                    flex-grow flex-shrink lg:flex-basis-1/2 xl:flex-basis-1/3
                    bg-gray
                    p-4 pt-3
                "
            >
                {{ if main_text }}
                    <figcaption
                        class="
                            prose
                            text-white
                            leading-snug
                            mb-4
                            {{ if text_position == 'below' }}sm:text-col-2{{ /if }}
                        "
                    >
                        {{ main_text | markdown }}
                    </figcaption>
                {{ /if }}
                {{ if materials }}
                    <dl class="text-white leading-snug mb-4">
                        <dt class="uppercase font-bold text-sm mb-1">Materials</dt>
                        {{ materials }}
                            <dd>{{ value }}</dd>
                        {{ /materials }}
                    </dl>
                {{ /if }}
                {{ if dimensions }}
                    <dl class="text-white leading-snug mb-4">
                        <dt class="uppercase font-bold text-sm mb-1">Dimensions</dt>
                        <dd>{{ dimensions }}</dd>
                    </dl>
                {{ /if }}
                {{ if for_sale }}
                    <dl class="text-white leading-snug">
                        <dt class="uppercase font-bold text-sm mb-1">Price</dt>
                        <dd class="font-bold">${{ price | format_number }} CAD</dd>
                        {{ if sale_note }}
                            <dd class="text-sm mt-1">{{ sale_note }}</dd>
                        {{ /if }}
                        <dd class="mt-3">
                            <a
                                href="mailto:metalsmith@wesleyharris.ca?subject=Enquiry: {{ title }}"
                                class="
                                    inline-block
                                    uppercase font-bold text-sm tracking-wide
                                    border border-white
                                    px-4 py-2
                                    hover:bg-white hover:text-gray
                                "
                            >
                                Contact to Purchase
                            </a>
                        </dd>
                    </dl>
                {{ /if }}
            </div>
        </figure>
        {{ if photo_grid }}
            <div
                class="
                    grid sm:grid-cols-2 gap-4
                "
            >
                {{ photo_grid }}
                    <figure
                        class="
                            flex flex-col
                        "
                    >
                        {{ photo }}
                            <img
                                src="{{ glide:url width='500' :height='image_height' }}"
                                alt="{{ alt | smartypants | entities }}"
                                class="{{ if description }}mb-4{{ /if }}"
                                loading="lazy"
                                decoding="async"
                            />
                        {{ /photo }}
                        {{ if description }}
                            <div
                                class="
                                    flex-grow
                                    bg-gray
                                    p-4 pt-3
                                "
                            >
                                <figcaption
                                    class="
                                        prose
                                        text-white
                                        leading-snug
                                    "
                                >
                                    {{ description | markdown }}
                                </figcaption>
                            </div>
                        {{ /if }}
                    </figure>
                {{ /photo_grid }}
            </div>
        {{ /if }}
    </main>
</div>
