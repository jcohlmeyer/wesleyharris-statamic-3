<section class="mb-10">
    <a href="{{ url }}" class="block group relative overflow-hidden">
        {{ main_photo }}
        <img
            src="{{ glide:url width='1400' height='700' fit='crop_focal' }}"
            alt="{{ alt | smartypants | entities }}"
            class="w-full object-cover block"
            loading="eager"
            decoding="async"
        />
        {{ /main_photo }}
        <div class="
            absolute bottom-0 left-0 right-0
            bg-gray
            p-4 md:p-6
            flex flex-col md:flex-row md:items-center md:justify-between
        ">
            <div>
                <p class="text-white uppercase text-xs font-bold tracking-widest mb-1 opacity-75">Process Series</p>
                <h2 class="text-white uppercase font-bold text-xl md:text-2xl leading-snug">{{ title }}</h2>
            </div>
            <span class="
                mt-3 md:mt-0 md:ml-6 flex-shrink-0
                inline-block
                text-white uppercase font-bold text-sm tracking-wide
                border border-white
                px-4 py-2
            ">
                View Process Series
            </span>
        </div>
    </a>
</section>
