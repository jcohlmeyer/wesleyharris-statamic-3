title: 'Jewellery & Hollowware'
sections:
  main:
    display: Main
    fields:
      -
        handle: title
        field:
          type: text
          required: true
          validate:
            - required
      -
        handle: category
        field:
          display: 'Category Slug'
          type: text
          listable: hidden
          instructions: 'Slug of the category page, e.g. hollowware, rings, bracelets'
          instructions_position: above
      -
        handle: jewellery_categories
        field:
          display: Category
          type: terms
          taxonomies:
            - jewellery_categories
          max_items: 1
          listable: hidden
          instructions_position: above
      -
        handle: main_photo
        field:
          mode: list
          container: assets
          folder: hollowware
          restrict: false
          allow_uploads: true
          show_filename: true
          max_files: 1
          display: 'Main Photo'
          type: assets
          icon: assets
          listable: hidden
          instructions_position: above
      -
        handle: text_position
        field:
          options:
            below: 'Below the Image'
            right: 'On the Right of the Image'
          inline: true
          cast_booleans: false
          default: below
          display: 'Text Position'
          type: radio
          icon: radio
          listable: hidden
          instructions_position: above
      -
        handle: main_text
        field:
          restrict: false
          automatic_line_breaks: true
          automatic_links: true
          escape_markup: false
          smartypants: true
          antlers: false
          display: Description
          type: markdown
          icon: markdown
          listable: hidden
          instructions_position: above
      -
        handle: materials
        field:
          display: Materials
          type: list
          icon: list
          listable: hidden
          instructions_position: above
          instructions: 'List each material on a separate line.'
      -
        handle: dimensions
        field:
          display: 'Dimensions'
          type: text
          listable: hidden
          instructions_position: above
          instructions: 'e.g. 4" × 4" × 0.30"'
      -
        handle: for_sale
        field:
          display: 'For Sale'
          type: toggle
          icon: toggle
          listable: hidden
          instructions_position: above
          default: false
      -
        handle: price
        field:
          display: 'Price (CAD)'
          type: integer
          icon: integer
          listable: hidden
          instructions_position: above
          if:
            for_sale: 'equals true'
      -
        handle: sale_note
        field:
          display: 'Sale Note'
          type: text
          icon: text
          listable: hidden
          instructions_position: above
          instructions: 'e.g. Available for sale within Canada only.'
          if:
            for_sale: 'equals true'
      -
        handle: photo_grid
        field:
          fields:
            -
              handle: photo
              field:
                mode: list
                container: assets
                folder: hollowware
                restrict: false
                allow_uploads: true
                show_filename: true
                max_files: 1
                display: Photo
                type: assets
                icon: assets
                listable: hidden
                instructions_position: above
                width: 66
            -
              handle: image_height
              field:
                display: 'Image Height'
                type: integer
                icon: integer
                width: 33
                listable: hidden
                instructions_position: above
                default: '367'
            -
              handle: description
              field:
                restrict: false
                automatic_line_breaks: true
                automatic_links: true
                escape_markup: false
                smartypants: true
                antlers: false
                display: Description
                type: markdown
                icon: markdown
                listable: hidden
                instructions_position: above
          mode: stacked
          add_row: 'Add Photo'
          reorderable: true
          display: 'Photo Grid'
          type: grid
          icon: grid
          listable: hidden
          instructions_position: above
  sidebar:
    display: Sidebar
    fields:
      -
        handle: slug
        field:
          type: slug
          required: true
          localizable: true
          validate:
            - required
